{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 text-center my-5">
        <h1 class="display-1 fw-bold text-danger">{{ code }}</h1>
        <h2 class="fw-bold text-white mb-4">{{ title }}</h2>
        <p class="lead text-muted mb-4">{{ message }}</p>
        <a href="{{ url_for('index') }}" class="btn btn-outline-primary fw-bold">Back to Safety</a>
    </div>
</div>
{% endblock %}
